services:
  # 1. RAG Engine (Python FastAPI)
  - type: web
    name: privashield-rag
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: python run.py
    rootDir: rag
    envVars:
      - key: GROQ_API_KEY
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: privashield-db
          property: connectionString
      - key: PYTHON_VERSION
        value: 3.11.0

  # 2. Backend Gateway (Node.js)
  - type: web
    name: privashield-backend
    env: node
    buildCommand: npm install
    startCommand: npm start
    rootDir: backend
    envVars:
      - key: RAG_API_URL
        fromService:
          type: web
          name: privashield-rag
          property: host
      - key: PORT
        value: 5000

  # 3. Frontend (React + Vite)
  - type: web
    name: privashield-frontend
    env: static
    buildCommand: npm install && npm run build
    publishDir: dist
    rootDir: frontend
    headers:
      - key: Access-Control-Allow-Origin
        value: "*"
    routes:
      - type: rewrite
        source: /api/*
        destination: https://privashield-backend.onrender.com/api/*
      - type: rewrite
        source: /*
        destination: /index.html

databases:
  - name: privashield-db
    databaseName: privashield
    user: admin
    plan: free
