services:
- type: web
  name: privashield-rag
  buildCommand: pip install -r requirements.txt
  startCommand: python run.py
  rootDir: rag
  envVars:
  - key: GROQ_API_KEY
    sync: false
  - key: DATABASE_URL
    fromDatabase:
      name: privashield-db
      property: connectionString
  - key: PYTHON_VERSION
    value: 3.11.0
  runtime: python
  plan: free
- type: web
  name: privashield-backend
  buildCommand: npm install
  startCommand: npm start
  rootDir: backend
  envVars:
  - key: RAG_API_URL
    fromService:
      type: web
      name: privashield-rag
      property: host
  - key: PORT
    value: '5000'
  runtime: node
  plan: free
- type: web
  name: privashield-frontend
  buildCommand: npm install && npm run build
  rootDir: frontend
  headers:
  - path: /*
    name: Access-Control-Allow-Origin
    value: '*'
  routes:
  - type: rewrite
    source: /api/*
    destination: https://privashield-backend.onrender.com/api/*
  - type: rewrite
    source: /*
    destination: /index.html
  runtime: static
  staticPublishPath: dist
  plan: free
databases:
- name: privashield-db
  databaseName: privashield
  user: admin
  plan: free
